<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillMatch Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f4;
      --surface: #ffffff;
      --surface2: #f0f0ef;
      --border: #e2e2df;
      --text: #1c1c1a;
      --text2: #6b6b67;
      --text3: #a3a39f;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --amber-bg: #fef3c7;
      --amber: #92400e;
      --red-bg: #fee2e2;
      --red: #991b1b;
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --surface2: #2e2e2c;
        --border: #3a3a38;
        --text: #f0f0ee;
        --text2: #a8a8a4;
        --text3: #6b6b67;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --green-bg: #14532d;
        --green: #86efac;
        --amber-bg: #451a03;
        --amber: #fcd34d;
        --red-bg: #450a0a;
        --red: #fca5a5;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Header */
    .header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px; font-weight: 700; flex-shrink: 0;
    }
    .header-text h1 { font-size: 17px; font-weight: 600; color: var(--text); }
    .header-text p { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text2);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }

    /* Chat container */
    .chat-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      height: 520px;
    }

    #msgs {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #msgs::-webkit-scrollbar { width: 4px; }
    #msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .bot-av { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
    .user-av { background: var(--accent); color: #fff; }

    .bubble {
      padding: 10px 14px;
      max-width: 76%;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 4px 14px 14px 14px;
    }
    .msg.bot .bubble {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-radius: 14px 4px 14px 14px;
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--accent); background: var(--surface); }
    #send-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text3);
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    /* Skill chips */
    .chip {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 12px;
      margin: 2px 3px 2px 0;
      border: 1px solid var(--border);
    }
    .chip.essential { background: var(--green-bg); color: var(--green); border-color: currentColor; }
    .chip.optional  { background: var(--amber-bg); color: var(--amber); border-color: currentColor; }
    .chip.tech      { background: var(--red-bg);   color: var(--red);   border-color: currentColor; }
    .chip.neutral   { background: var(--surface2); color: var(--text2); }

    /* Rich card for role info */
    .role-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-top: 8px;
    }
    .role-card h3 { font-size: 14px; font-weight: 600; color: var(--text); text-transform: capitalize; }
    .role-card p  { font-size: 12px; color: var(--text2); margin: 4px 0 8px; line-height: 1.4; }
    .skill-section { margin-top: 8px; }
    .skill-section label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text3); display: block; margin-bottom: 4px;
    }

    /* Suggestion chips */
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 12px;
    }
    .sug-btn {
      padding: 5px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .sug-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Formatting inside bubbles */
    .bubble b { font-weight: 600; }
    .bubble ul { padding-left: 16px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }

    /* DB status bar */
    .db-bar {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      padding: 6px 16px;
      font-size: 11px;
      color: var(--text3);
      display: flex; align-items: center; gap: 6px;
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .db-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
    .db-dot.loaded { background: #22c55e; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">SM</div>
    <div class="header-text">
      <h1>SkillMatch Assistant</h1>
      <p>Career & Skills Intelligence · ESCO Database</p>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="status-text">Loading...</span>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-container">
    <div id="msgs"></div>

    <div class="suggestions" id="suggestions">
      <button class="sug-btn" onclick="quickSend('What skills do I need for a Business Analyst?')">Business Analyst skills</button>
      <button class="sug-btn" onclick="quickSend('I know Python, SQL and Excel — what roles suit me?')">Match my skills</button>
      <button class="sug-btn" onclick="quickSend('What roles can a Software Developer move to?')">Career transitions</button>
      <button class="sug-btn" onclick="quickSend('What does a Data Scientist do?')">Data Scientist info</button>
    </div>

    <div class="input-row">
      <input id="user-input" placeholder="Ask about roles, skills, or careers..." autocomplete="off" />
      <button id="send-btn">Send ↗️</button>
    </div>

    <div class="db-bar">
      <div class="db-dot" id="db-dot"></div>
      <span id="db-status">Loading occupation database...</span>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// CONFIG — your Gemini API key is pre-loaded
// ─────────────────────────────────────────────
const GEMINI_KEY = 'AIzaSyByAHXrVMzMm0dX0BbHchae3c3MAxReY3o';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let OCC_DB = null;
let chatHistory = [];

// ─────────────────────────────────────────────
// DOM REFS
// ─────────────────────────────────────────────
const msgsEl   = document.getElementById('msgs');
const inputEl  = document.getElementById('user-input');
const sendBtn  = document.getElementById('send-btn');
const dbDot    = document.getElementById('db-dot');
const dbStatus = document.getElementById('db-status');
const statusTxt= document.getElementById('status-text');

// ─────────────────────────────────────────────
// LOAD DATABASE
// ─────────────────────────────────────────────
async function loadDB() {
  try {
    const res = await fetch('./skill_db.json');
    if (!res.ok) throw new Error('fetch failed');
    OCC_DB = await res.json();
    dbDot.classList.add('loaded');
    dbStatus.textContent = `${OCC_DB.length.toLocaleString()} occupations loaded · ESCO v1.2`;
    statusTxt.textContent = `${OCC_DB.length.toLocaleString()} roles`;
  } catch (e) {
    dbStatus.textContent = 'Database not found — place skill_db.json in the same folder.';
    statusTxt.textContent = 'DB missing';
  }
}

// ─────────────────────────────────────────────
// OCCUPATION SEARCH (fuzzy)
// ─────────────────────────────────────────────
function findOccupations(query, limit = 5) {
  if (!OCC_DB) return [];
  const q = query.toLowerCase().trim();
  const results = [];

  for (const occ of OCC_DB) {
    const name = occ.n.toLowerCase();
    const alts = (occ.a || []).map(a => a.toLowerCase());
    let score = 0;

    if (name === q)                        score = 100;
    else if (alts.some(a => a === q))      score = 95;
    else if (name.includes(q))             score = 80;
    else if (q.includes(name))             score = 70;
    else if (alts.some(a => a.includes(q) || q.includes(a))) score = 65;
    else {
      const words = q.split(/\s+/).filter(w => w.length > 2);
      const hits  = words.filter(w => name.includes(w) || alts.some(a => a.includes(w)));
      if (hits.length) score = hits.length * 18;
    }

    if (score > 0) results.push({ ...occ, score });
  }

  results.sort((a, b) => b.score - a.score);
  return results.slice(0, limit);
}

function buildContext(userMsg) {
  if (!OCC_DB) return '';
  const matches = findOccupations(userMsg, 4);
  if (!matches.length) return '';

  let ctx = 'Relevant occupations from ESCO database:\n\n';
  for (const m of matches) {
    ctx += `Occupation: ${m.n}\n`;
    if (m.desc) ctx += `Description: ${m.desc}\n`;
    if (m.e?.length) ctx += `Essential skills: ${m.e.join(', ')}\n`;
    if (m.o?.length) ctx += `Optional/useful skills: ${m.o.join(', ')}\n`;
    ctx += '\n';
  }
  return ctx;
}

// ─────────────────────────────────────────────
// DETECT SKILL/ROLE QUERIES
// ─────────────────────────────────────────────
function isCareerQuery(text) {
  const t = text.toLowerCase();
  return /\b(role|job|career|occupation|position|work as|become a|analyst|engineer|developer|manager|designer|consultant|scientist|specialist|officer|director|coordinator|technician|architect|accountant|nurse|teacher|lawyer|doctor)\b/.test(t)
      || /\b(skill|skills|learn|need to know|required|qualify|transition|switch to|move into|apply for|good at|experience in|background in)\b/.test(t)
      || /what (skills|do i need|should i learn|is needed)/i.test(t)
      || /roles? (for|with|using|that use)/i.test(t)
      || /\b(ba|pm|ux|ui|qa|hr|cto|cfo|ceo|devops|ml|ai)\b/.test(t);
}

// ─────────────────────────────────────────────
// CALL GEMINI
// ─────────────────────────────────────────────
async function callGemini(userMsg) {
  const dbCtx = isCareerQuery(userMsg) ? buildContext(userMsg) : '';

  const systemPrompt = `You are SkillMatch Assistant — a friendly, expert career and skills advisor. Your job is to help users understand careers, required skills, and how to transition between roles.

${dbCtx ? '=== OCCUPATION DATABASE CONTEXT ===\n' + dbCtx + '=== END CONTEXT ===\n\nUse the above data to give specific, accurate answers.' : ''}

Guidelines:
- For role/skill questions: list essential skills first, then optional/nice-to-have skills. Be specific.
- For "I have these skills" questions: match them against roles from the database and explain the fit.
- For career transition questions: suggest logical next roles and what skills to add.
- Keep answers clear and well-structured. Use bullet points for skill lists.
- For general conversation (greetings, jokes, general knowledge): respond naturally and warmly.
- Be concise — under 250 words unless the user asks for detail.`;

  const contents = [];
  for (const h of chatHistory.slice(-8)) {
    contents.push({ role: h.role, parts: [{ text: h.text }] });
  }
  contents.push({ role: 'user', parts: [{ text: userMsg }] });

  const res = await fetch(GEMINI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: systemPrompt }] },
      contents,
      generationConfig: { maxOutputTokens: 700, temperature: 0.7 }
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response received.';
}

// ─────────────────────────────────────────────
// RENDER HELPERS
// ─────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatBubble(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.*?)\*/g, '<i>$1</i>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<b>$1</b>')
    .replace(/^[-•*]\s+(.+)$/gm, '• $1<br>')
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addMsg(role, html) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role === 'bot' ? 'bot-av' : 'user-av'}`;
  av.textContent = role === 'bot' ? 'SM' : 'You';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;

  if (role === 'bot') { wrap.appendChild(av); wrap.appendChild(bubble); }
  else                { wrap.appendChild(bubble); wrap.appendChild(av); }

  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return bubble;
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing-row';
  const av = document.createElement('div');
  av.className = 'avatar bot-av'; av.textContent = 'SM';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  d.appendChild(av); d.appendChild(b);
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

// ─────────────────────────────────────────────
// SEND MESSAGE
// ─────────────────────────────────────────────
async function sendMessage(text) {
  text = text.trim();
  if (!text) return;

  // Hide suggestions after first message
  const sug = document.getElementById('suggestions');
  if (sug) sug.style.display = 'none';

  inputEl.value = '';
  sendBtn.disabled = true;

  addMsg('user', escHtml(text));
  showTyping();
  chatHistory.push({ role: 'user', text });

  try {
    const reply = await callGemini(text);
    removeTyping();
    addMsg('bot', formatBubble(reply));
    chatHistory.push({ role: 'model', text: reply });
  } catch (e) {
    removeTyping();
    addMsg('bot', `<b>Error:</b> ${escHtml(e.message)}<br><small>Check your API key and internet connection.</small>`);
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function quickSend(text) {
  inputEl.value = text;
  sendMessage(text);
}

// ─────────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────────
sendBtn.onclick = () => sendMessage(inputEl.value);
inputEl.onkeydown = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
};

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
(async () => {
  await loadDB();
  const count = OCC_DB ? OCC_DB.length.toLocaleString() : 'N/A';
  addMsg('bot', `👋 Hi! I'm your <b>SkillMatch Assistant</b> — powered by Gemini AI and an ESCO database of <b>${count} occupations</b>.<br><br>
I can help you with:<br>
• <b>Role → Skills</b>: "What skills do I need for a Business Analyst role?"<br>
• <b>Skills → Roles</b>: "I know Python, SQL, and Power BI — what roles suit me?"<br>
• <b>Career transitions</b>: "I'm a BA, what roles can I move to?"<br>
• <b>General questions</b>: Anything else you'd like to know!<br><br>
Try one of the suggestions below, or type your own question.`);
})();
</script>
</body>
</html>
